services:
  # --- Service Database: MySQL 8.0 ---
  mysql-db:
    image: mysql:8.0.45-debian
    container_name: acnecare-mysql
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:acnecare}
      MYSQL_ROOT_PASSWORD: ${DATABASE_PASSWORD:root}
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - acnecare-network

  redis-cache:
    image: redis:alpine
    container_name: acnecare-redis
    ports:
      - "6379:6379"
    networks:
      - acnecare-network

  app:
    image: nguyenanh132/acnecare-demo-cicd:latest
    container_name: acnecare-app
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_started
    ports:
      - "8080:8080"
    restart: always
    environment:
      # Kết nối Database dùng tên service "mysql-db"
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/acnecare?allowPublicKeyRetrieval=true&useSSL=false&createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=${DATABASE_USERNAME:root}
      - SPRING_DATASOURCE_PASSWORD=${DATABASE_PASSWORD:root}

      - SPRING_DATA_REDIS_HOST=redis-cache
      - SPRING_DATA_REDIS_PORT=6379

      - JWT_SIGNER_KEY=${JWT_SIGNER_KEY:fb886b389ba6cd149a7deef483af664b62ff17776eb0d04a991251c0e4fba92e}

      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
      - STORAGE_MAX_FILE_SIZE=${STORAGE_MAX_FILE_SIZE:10485760}
      - STORAGE_ALLOWED_TYPES=${STORAGE_ALLOWED_TYPES:image/jpeg,image/png,image/webp,image/gif,application/pdf}
      - STORAGE_MAX_USER_SIZE=${STORAGE_MAX_USER_SIZE:209715200}
      - STORAGE_MAX_FACESCAN_USER_SIZE=${STORAGE_MAX_FACESCAN_USER_SIZE:524288000}
    volumes:
      - ./uploads:/app/uploads
    networks:
      - acnecare-network

networks:
  acnecare-network:
    driver: bridge
