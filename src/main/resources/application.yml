server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: acnecare-api
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/acnecare}
    username: ${DATABASE_USERNAME:root}
    password: ${DATABASE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  signer_key: ${JWT_SIGNER_KEY:fb886b389ba6cd149a7deef483af664b62ff17776eb0d04a991251c0e4fba92e}
  access-token-valid-duration: 3600
  refresh-token-valid-duration: 604800

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}

storage:
  upload-dir: ./uploads
  base-url: http://localhost:8080/api/files
  max-file-size: ${STORAGE_MAX_FILE_SIZE:10485760}
  allowed-types: ${STORAGE_ALLOWED_TYPES:image/jpeg,image/png,image/webp,image/gif,application/pdf}
  max-user-size: ${STORAGE_MAX_USER_SIZE:209715200}
  max-facescan-user-size: ${STORAGE_MAX_FACESCAN_USER_SIZE:524288000}
